name: Build tfx-bsl Nightly

on:
  pull_request:
    branches:
      - master
  schedule:
    # Trigger every night at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build Wheels (Nightly)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build: ["cp310", "cp311", "cp312", "cp313"]
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Disable Bzlmod
      run: |
        echo "common --noenable_bzlmod" > ~/.bazelrc
        echo "build --noenable_bzlmod" >> ~/.bazelrc

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.23.3
      env:
        CIBW_BUILD: ${{ matrix.build }}-*
        TFX_DEPENDENCY_SELECTOR: GIT_MASTER
        CIBW_ENVIRONMENT: TFX_DEPENDENCY_SELECTOR="GIT_MASTER" USE_BAZEL_VERSION="7.7.0" BAZEL_ARGS="--noenable_bzlmod"

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-nightly-${{ matrix.os }}-${{ matrix.build }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl
